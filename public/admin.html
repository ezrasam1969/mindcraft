<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MINDCRAFT 2026 | Admin Dashboard</title>
  <meta name="description" content="Admin dashboard for MINDCRAFT 2026 event registrations — view, sort, search, and export participant data." />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #00f5ff;
      --secondary: #ff006e;
      --bg:        #050a14;
      --bg2:       #0d1b2a;
      --glass:     rgba(255,255,255,0.04);
      --border:    rgba(0,245,255,0.15);
      --text:      #e0e8f0;
      --font-head: 'Orbitron', monospace;
      --font-body: 'Rajdhani', sans-serif;
      --success:   #00e676;
      --warning:   #ffab00;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      min-height: 100vh;
    }

    /* ── Top Bar ─────────────────────────────── */
    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
    }

    .admin-topbar .logo {
      font-family: var(--font-head);
      font-size: 1.3rem;
      color: var(--primary);
      text-shadow: 0 0 15px var(--primary);
      text-decoration: none;
    }
    .admin-topbar .logo span { color: var(--text); font-weight: 400; font-size: 0.85rem; margin-left: 12px; letter-spacing: 2px; }

    .topbar-actions { display: flex; gap: 12px; align-items: center; }

    .btn {
      padding: 10px 22px;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #0088aa);
      color: #000;
      box-shadow: 0 0 15px rgba(0,245,255,0.3);
    }
    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(0,245,255,0.5);
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Stats Bar ───────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .stat-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      transition: all 0.3s;
    }
    .stat-card:hover {
      border-color: var(--primary);
      box-shadow: 0 0 25px rgba(0,245,255,0.1);
    }
    .stat-card .stat-value {
      font-family: var(--font-head);
      font-size: 2rem;
      color: var(--primary);
      text-shadow: 0 0 15px var(--primary);
      display: block;
      margin-bottom: 6px;
    }
    .stat-card .stat-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Controls Bar ────────────────────────── */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px 20px;
      max-width: 1400px;
      margin: 0 auto;
      flex-wrap: wrap;
      gap: 15px;
    }

    .search-box {
      position: relative;
      flex: 1;
      max-width: 400px;
    }
    .search-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
    }
    .search-box input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 16px 11px 40px;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border 0.3s, box-shadow 0.3s;
    }
    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 12px rgba(0,245,255,0.15);
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.25); }

    .filter-group { display: flex; gap: 10px; align-items: center; }
    .filter-group select {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
    }
    .filter-group select option { background: #0d1b2a; }

    /* ── Table ────────────────────────────────── */
    .table-wrapper {
      padding: 0 40px 40px;
      max-width: 1400px;
      margin: 0 auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    thead {
      background: rgba(0,245,255,0.06);
    }

    th {
      font-family: var(--font-head);
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--primary);
      padding: 16px 14px;
      text-align: left;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.3s;
      position: relative;
    }
    th:hover { color: #fff; }
    th .sort-icon { margin-left: 6px; font-size: 0.65rem; opacity: 0.4; }
    th.sorted .sort-icon { opacity: 1; color: var(--primary); }

    td {
      padding: 14px 14px;
      font-size: 0.9rem;
      border-top: 1px solid rgba(0,245,255,0.06);
      white-space: nowrap;
    }

    tbody tr {
      transition: background 0.2s;
    }
    tbody tr:hover {
      background: rgba(0,245,255,0.04);
    }

    .badge-status {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .badge-confirmed {
      background: rgba(0,230,118,0.12);
      color: var(--success);
      border: 1px solid rgba(0,230,118,0.3);
    }
    .badge-event {
      background: rgba(0,245,255,0.1);
      color: var(--primary);
      border: 1px solid rgba(0,245,255,0.3);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

    .reg-id-cell {
      font-family: var(--font-head);
      font-size: 0.75rem;
      color: var(--primary);
      letter-spacing: 1px;
    }

    /* ── Empty State ──────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255,255,255,0.4);
    }
    .empty-state i { font-size: 3rem; margin-bottom: 20px; display: block; color: rgba(0,245,255,0.2); }
    .empty-state p { font-size: 1.1rem; }

    /* ── Loading ──────────────────────────────── */
    .loading-overlay {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
    }
    .loading-overlay .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ───────────────────────────────── */
    .admin-footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      margin-top: auto;
    }

    /* ── Responsive ───────────────────────────── */
    @media (max-width: 768px) {
      .admin-topbar { padding: 15px 20px; }
      .stats-bar { padding: 20px; }
      .controls-bar { padding: 10px 20px; }
      .table-wrapper { padding: 0 20px 20px; }
      .admin-topbar .logo span { display: none; }
    }
  </style>
</head>
<body>

  <!-- ── TOP BAR ──────────────────────────── -->
  <div class="admin-topbar">
    <a href="/" class="logo">⚡ MINDCRAFT <span>ADMIN PANEL</span></a>
    <div class="topbar-actions">
      <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i>&nbsp; Refresh</button>
      <button class="btn btn-primary" id="exportBtn"><i class="fas fa-file-csv"></i>&nbsp; Export CSV</button>
    </div>
  </div>

  <!-- ── STATS ────────────────────────────── -->
  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-value" id="totalCount">—</span>
      <span class="stat-label">Total Registrations</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="eventCount">—</span>
      <span class="stat-label">Unique Events</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="collegeCount">—</span>
      <span class="stat-label">Colleges</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="todayCount">—</span>
      <span class="stat-label">Today</span>
    </div>
  </div>

  <!-- ── CONTROLS ─────────────────────────── -->
  <div class="controls-bar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by name, email, college…" />
    </div>
    <div class="filter-group">
      <select id="eventFilter">
        <option value="">All Events</option>
        <option>Hackathon</option>
        <option>AI Challenge</option>
        <option>CTF</option>
        <option>Paper Presentation</option>
        <option>UI/UX Design</option>
        <option>Quiz</option>
      </select>
    </div>
  </div>

  <!-- ── TABLE ────────────────────────────── -->
  <div class="table-wrapper">
    <div class="loading-overlay" id="loadingState">
      <div class="spinner"></div>
    </div>

    <table id="regTable" style="display:none;">
      <thead>
        <tr>
          <th data-col="index"># <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="fullName">NAME <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="email">EMAIL <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="phone">PHONE <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="college">COLLEGE <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="department">DEPT <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="year">YEAR <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="event">EVENT <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="teamName">TEAM <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="registrationId">REG ID <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="status">STATUS <i class="fas fa-sort sort-icon"></i></th>
          <th data-col="registeredAt">DATE <i class="fas fa-sort sort-icon"></i></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="empty-state" id="emptyState" style="display:none;">
      <i class="fas fa-inbox"></i>
      <p>No registrations found</p>
    </div>
  </div>

  <!-- ── FOOTER ───────────────────────────── -->
  <div class="admin-footer">
    © 2026 MINDCRAFT Admin — Karunya Institute of Technology and Science
  </div>

  <script src="admin.js"></script>
</body>
</html>
